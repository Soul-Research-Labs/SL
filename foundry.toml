[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.default.fuzz]
runs = 10000
max_test_rejects = 65536
seed = "0x1"

[profile.default.invariant]
runs = 256
depth = 32
fail_on_revert = false

[profile.ci]
fuzz = { runs = 50000 }
invariant = { runs = 512, depth = 64 }

[rpc_endpoints]
avalanche_fuji = "${AVALANCHE_FUJI_RPC_URL}"
avalanche_mainnet = "${AVALANCHE_MAINNET_RPC_URL}"
moonbase_alpha = "${MOONBASE_ALPHA_RPC_URL}"
moonbeam = "${MOONBEAM_RPC_URL}"
astar_shibuya = "${ASTAR_SHIBUYA_RPC_URL}"
astar = "${ASTAR_RPC_URL}"
evmos_testnet = "${EVMOS_TESTNET_RPC_URL}"
evmos = "${EVMOS_RPC_URL}"
aurora_testnet = "${AURORA_TESTNET_RPC_URL}"
aurora = "${AURORA_RPC_URL}"
ethereum_sepolia = "${ETHEREUM_SEPOLIA_RPC_URL}"

[etherscan]
avalanche_fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }
avalanche_mainnet = { key = "${SNOWTRACE_API_KEY}", url = "https://api.snowtrace.io/api" }
moonbase_alpha = { key = "${MOONSCAN_API_KEY}", url = "https://api-moonbase.moonscan.io/api" }
moonbeam = { key = "${MOONSCAN_API_KEY}", url = "https://api-moonbeam.moonscan.io/api" }
