# ────────────────────────────────────────────────────────────
# Soul Privacy Relayer — Example Configuration
# ────────────────────────────────────────────────────────────
#
# Copy this file to config.toml and fill in the values.
#
# Environment variable interpolation:
#   Prefix any value with "env:" to read from the environment at startup.
#   Example: signer_key = "env:RELAYER_FUJI_SIGNER_KEY"
#
# SECURITY: Never commit config.toml with real private keys to version control.
#   Use env vars or a secrets manager (Vault, AWS Secrets Manager, etc.).
#
# See docs/OPERATIONAL_RUNBOOK.md for deployment guidance.
# ────────────────────────────────────────────────────────────

# ── Global Settings ─────────────────────────────────────────

# Prometheus metrics endpoint
metrics_port = 9090

# Logging level: trace, debug, info, warn, error
log_level = "info"

# Health-check HTTP endpoint (0 = disabled)
health_port = 8080

# Maximum concurrent relay transactions across all chains
max_concurrent_relays = 8

# Gas price safety cap (gwei). Relayer will skip relay if gas exceeds this.
max_gas_price_gwei = 150

# ── Chain Watchers ──────────────────────────────────────────
#
# Each [[chains]] entry configures a chain the relayer monitors and relays to.
#
# Required fields:
#   chain_id                  — EVM chain ID
#   name                      — Human-readable label (for logs/metrics)
#   ws_rpc_url                — WebSocket RPC endpoint (for real-time event listening)
#   http_rpc_url              — HTTP RPC endpoint (for tx submission)
#   epoch_manager_address     — Deployed EpochManager contract address
#   pool_address              — Deployed PrivacyPool contract address
#   bridge_adapter_address    — Deployed bridge adapter contract address
#   signer_key                — Hex private key (use "env:VAR_NAME" for safety)
#
# Optional fields:
#   poll_interval_secs        — Block polling interval (default: 6)
#   confirmation_blocks       — Blocks to wait before relaying (default: 2)
#   gas_multiplier            — Gas estimate multiplier (default: 1.2)
#   max_retry_attempts        — Failed tx retry count (default: 3)
#   retry_delay_secs          — Seconds between retries (default: 10)

[[chains]]
chain_id = 43113
name = "Avalanche Fuji"
ws_rpc_url = "wss://api.avax-test.network/ext/bc/C/ws"
http_rpc_url = "https://api.avax-test.network/ext/bc/C/rpc"
epoch_manager_address = "0x0000000000000000000000000000000000000000"
pool_address = "0x0000000000000000000000000000000000000000"
bridge_adapter_address = "0x0000000000000000000000000000000000000000"
signer_key = "env:RELAYER_FUJI_SIGNER_KEY"
poll_interval_secs = 6
confirmation_blocks = 2
gas_multiplier = 1.2
max_retry_attempts = 3
retry_delay_secs = 10

