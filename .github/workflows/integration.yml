name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify integration test files exist
        run: |
          count=$(find test/integration -name '*.t.sol' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No integration test files found"
            exit 1
          fi
          echo "Found $count integration test files"

      - name: Run integration tests
        run: forge test --match-path "test/integration/*" -vvv

  fork-tests:
    name: Fork Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run fork tests (Fuji)
        run: forge test --match-path "test/fork/*" -vvv --fork-url ${{ secrets.AVALANCHE_FUJI_RPC || 'https://api.avax-test.network/ext/bc/C/rpc' }}

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify fuzz test files exist
        run: |
          count=$(find test/fuzz -name '*.t.sol' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No fuzz test files found"
            exit 1
          fi
          echo "Found $count fuzz test files"

      - name: Run fuzz tests (extended runs)
        run: forge test --match-path "test/fuzz/*" -vvv
        env:
          FOUNDRY_FUZZ_RUNS: 1000
