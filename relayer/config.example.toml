# ── Universal Nullifier Registry ────────────────────────────
#
# The canonical nullifier registry used for cross-chain double-spend prevention.
# The relayer posts nullifier roots from each chain to the registry.

[registry]
chain_id = 43113
address = "0x0000000000000000000000000000000000000000"
rpc_url = "https://api.avax-test.network/ext/bc/C/rpc"
signer_key = "env:RELAYER_REGISTRY_SIGNER_KEY"

# ── Metadata Resistance ────────────────────────────────────
#
# Configures anti-correlation defenses to prevent transaction graph analysis.
#
# jitter_enabled      — Add random delay before relaying to decorrelate timing.
# max_jitter_ms       — Maximum random delay (ms). Higher = better privacy, slower UX.
# batching_enabled    — Aggregate multiple relay operations into single batches.
# batch_size          — Minimum relay ops to include per batch.
# batch_timeout_secs  — Max time to wait for batch_size before flushing.
# dummy_padding_enabled — Insert dummy transactions to further obscure real traffic patterns.
# dummy_interval_secs — Interval between dummy transactions (only if dummy_padding_enabled).

[metadata_resistance]
jitter_enabled = true
max_jitter_ms = 5000
batching_enabled = true
batch_size = 10
batch_timeout_secs = 30
dummy_padding_enabled = false
dummy_interval_secs = 60

