name: SDK CI

on:
  push:
    branches: [main, develop]
    paths:
      - "sdk/**"
  pull_request:
    branches: [main]
    paths:
      - "sdk/**"

jobs:
  build-and-test:
    name: SDK Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: sdk
        run: npm ci

      - name: Lint
        working-directory: sdk
        run: npm run lint

      - name: Build
        working-directory: sdk
        run: npm run build

      - name: Test
        working-directory: sdk
        run: npm test -- --ci --coverage

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v4
        with:
          files: sdk/coverage/lcov.info
          flags: sdk

  docs:
    name: SDK Docs
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: sdk
        run: npm ci

      - name: Build (required for TypeDoc)
        working-directory: sdk
        run: npm run build

      - name: Generate API docs (Markdown)
        working-directory: sdk
        run: npm run docs

      - name: Verify docs generated
        working-directory: sdk
        run: |
          test -d docs || (echo "TypeDoc output missing" && exit 1)
          echo "Generated docs files:"
          find docs -type f | head -20

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-api-docs
          path: sdk/docs/
          retention-days: 30
