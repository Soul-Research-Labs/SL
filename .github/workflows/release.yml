name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-circuits:
    name: Build Noir Circuits
    runs-on: ubuntu-latest
    strategy:
      matrix:
        circuit: [deposit, withdraw, transfer, stealth, nullifier_check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo
        uses: noir-lang/noirup@v0.1.3
        with:
          toolchain: nightly

      - name: Compile
        working-directory: noir/circuits/${{ matrix.circuit }}
        run: nargo compile

      - uses: actions/upload-artifact@v4
        with:
          name: circuit-${{ matrix.circuit }}
          path: noir/circuits/${{ matrix.circuit }}/target/

  build-contracts:
    name: Build Solidity Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build --sizes

      - uses: actions/upload-artifact@v4
        with:
          name: solidity-artifacts
          path: out/

  build-wasm:
    name: Build Wasm Contracts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: privacy-pool-cosmwasm
            name: cosmwasm
          - package: privacy-pool-near
            name: near
          - package: ink-privacy-pool
            name: ink
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build ${{ matrix.name }}
        run: |
          RUSTFLAGS='-C link-arg=-s' cargo build \
            -p ${{ matrix.package }} \
            --release \
            --target wasm32-unknown-unknown

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.name }}
          path: target/wasm32-unknown-unknown/release/*.wasm

  build-relayer:
    name: Build Relayer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build relayer
        run: cargo build -p soul-relayer --release

      - uses: actions/upload-artifact@v4
        with:
          name: relayer-linux
          path: target/release/soul-relayer

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        working-directory: sdk
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/

  release:
    name: Create Release
    needs:
      [build-circuits, build-contracts, build-wasm, build-relayer, build-sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Package artifacts
        run: |
          cd release-artifacts
          for dir in */; do
            tar -czf "${dir%/}.tar.gz" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*.tar.gz
